{% extends "base.html" %}
{% block content %}

<div class="section">
<h1 data-i18n="market__title"></h1>
</div>

<div class="market-layout">

    <!-- 左侧 -->
    <div class="left-panel">
        <h2 data-i18n="market__top_models"></h2>
        <div id="models"></div>
    </div>

    <!-- 右侧 -->
    <div class="right-panel">
        <h2>        
            <span data-i18n="market__price_trends"></span>
            — <span id="currentModel">iphone 12 pro</span>  
        </h2>
        <canvas id="trendChart" height="120"></canvas>
    </div>

</div>

<div class="section">
<h2 data-i18n="market__arbitrage"></h2>
<div id="arbitrage"></div>
</div>

<style>
/* 👉 放这里 */
.market-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    margin-top: 20px;
}

.left-panel {
    max-height: 600px;
    overflow-y: auto;
}

.right-panel {
    width: 100%;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let trendChart = null

function selectModel(model, el){

    // 👉 1. 移除所有高亮
    document.querySelectorAll("#models .card").forEach(c=>{
        c.style.border = "1px solid rgba(255,255,255,0.05)"
        c.style.background = "#0f172a"
    })

    // 👉 2. 高亮当前点击
    el.style.border = "1px solid #22C55E"
    el.style.background = "rgba(34,197,94,0.1)"

    // 👉 3. 更新图表
    loadTrend(model)

    // 👉 4. 更新标题
    document.getElementById("currentModel").innerText = model
}

/* ===== MODELS ===== */
async function loadModels(){

    const res = await fetch("/api/top_models",{
        headers:{
            "Authorization":"Bearer " + localStorage.getItem("token")
        }
    })

    const resData = await res.json()
    const data = Array.isArray(resData) ? resData : (resData.data || [])
    console.log("TOP_MODELS最终数据:", data)
   
    const container = document.getElementById("models")
    container.innerHTML = ""

    data.slice(0,6).forEach(m=>{

        container.innerHTML += `
        <div class="card" style="margin-bottom:10px;cursor:pointer;"
             onclick="selectModel('${m.model}', this)">
            <div><b>${m.model}</b></div>
            <div>${t("market__price",{price: m.median_price || "-"})}</div>
        </div>
        `
    })
    
    applyTranslations()    

}

/* ===== TREND ===== */
async function loadTrend(model="iphone 12 pro"){

    const res = await fetch(`/api/price_trend?model=${encodeURIComponent(model)}&period=30D`)
    const data = await res.json()

    if(!data || data.length === 0) return

    const prices = []
    const labels = []

    // 👉 按“天”分组
    let buckets = {}

    data.forEach(p => {

        const d = new Date(p.time * 1000)

        const key = d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate()

        if(!buckets[key]){
            buckets[key] = []
        }

        buckets[key].push(p.price)
    })

    // 👉 排序日期
    Object.keys(buckets).sort().forEach(date => {

        const arr = buckets[date]
            .filter(p => p > 100 && p < 1000) // 可选：过滤异常值
            .sort((a,b)=>a-b)

        if(arr.length === 0) return

        const mid = Math.floor(arr.length / 2)
        const median = arr[mid]

        prices.push(median)

        const parts = date.split("-")
        const label = parts[2] + "/" + parts[1]

        labels.push(label)
    })

    const ctx = document.getElementById("trendChart").getContext("2d")

    if(trendChart){
        trendChart.destroy()
    }

    trendChart = new Chart(ctx,{
        type:"line",
        data:{
            labels:labels,
            datasets:[{
                label: model,
                data:prices,
                borderColor:"#22C55E",
                backgroundColor:"rgba(34,197,94,0.15)",
                borderWidth:2,
                tension:0.4,
                pointRadius:0,
                fill:true
            }]
        }
    })
}


window.addEventListener("DOMContentLoaded", async () => {
    loadModels()
    loadTrend()
    loadArbitrage()
})

window.loadMarket = async function(){
    await loadHotModels()
    await loadModels()
    await loadTrend()
    await loadArbitrage()
}

async function loadArbitrage(){

    const res = await fetch("/api/radar/arbitrage_index",{
        headers:{ 
            "Authorization":"Bearer " + localStorage.getItem("token")
        }
    })                  

    const data = await res.json()

    console.log("ARBITRAGE:", data)

    const container = document.getElementById("arbitrage")
    container.innerHTML = ""

    data.slice(0,6).forEach(d=>{
        container.innerHTML += `
        <div class="card" style="margin-bottom:10px;">
            <div><b>${d.model}</b></div>
            <div>€${d.profit}</div>
        </div>
        `
    })

}

async function loadHotModels(){

    const res = await fetch("/api/radar/hot_models",{
        headers:{
            "Authorization":"Bearer " + localStorage.getItem("token")
        }
    })

    const data = await res.json()

    console.log("HOT MODELS:", data)

    const container = document.getElementById("models")    


    data.slice(0,5).forEach(d=>{
        container.innerHTML += `
        <div class="card" style="margin-bottom:10px;border:1px solid #22C55E;">
            <div><b>${d.model}</b></div>
            <div>🔥 ${d.listings} listings</div>
        </div>
        `
    })

}

</script>

{% endblock %}
